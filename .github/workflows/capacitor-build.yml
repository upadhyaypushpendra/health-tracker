name: Build Android Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # 🟢 Node (stable version)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # 'zulu' or 'microsoft' also work

      # 🧹 Clean install (fix Tailwind oxide issue)
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --omit-optional
          npm install --include=optional @tailwindcss/oxide-linux-x64-gnu
          npm rebuild

      # 🤖 Android SDK (safety)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔑 Restore debug keystore for consistent APK signing
      - name: Setup debug keystore
        run: |
          mkdir -p $HOME/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/.android/debug.keystore

      # 🏗 Build Capacitor + Debug APK
      - name: Build Debug APK
        env:
          TAILWIND_DISABLE_OXIDE: true
        run: |
          npm run cap:build
          cd android
          ./gradlew assembleDebug

      # 📦 Upload APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create and Upload Release
        if: github.event_name != 'pull_request'
        run: |
          gh release create "v${{ github.run_number }}" \
            --title "Build ${{ github.run_number }}" \
            --notes "Automatic build from branch ${{ github.ref_name }}" \
            android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}